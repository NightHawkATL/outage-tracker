services:
  outage-tracker:
    build: .
    container_name: outage-tracker
    ports:
      - "8585:8080"
    volumes:
      - /mnt/Apps/Storage/outage-tracker:/app/data
      - ./auth_key:/app/auth_key
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=America/New_York
    restart: unless-stopped