---
# Pipeline 1: Smoke test on every push and pull request
kind: pipeline
type: docker
name: smoke-test

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - pull_request

steps:
  - name: install-and-compile-check
    image: python:3.11-alpine
    commands:
      - apk add --no-cache gcc musl-dev libffi-dev openssl-dev
      - python -V
      - pip install --no-cache-dir -r requirements.txt
      - python -m py_compile app.py reset_auth.py
      - echo "Smoke test passed"

---
# Pipeline 2: Ollama Automated PR Review
kind: pipeline
type: docker
name: ollama-pr-review

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - pull_request

steps:
  - name: run-ollama-review
    image: python:3.11-alpine
    failure: ignore
    environment:
      GITEA_SERVER:
        from_secret: GITEA_SERVER
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
      OLLAMA_URL:
        from_secret: OLLAMA_URL
      OLLAMA_MODEL: qwen2.5-coder:7b
    commands:
      - echo "Running Ollama PR Review Bot..."
      - python ci/ollama_pr_review.py

---
# Pipeline 3: Build and publish multi-arch Docker image on release tag
kind: pipeline
type: docker
name: docker-publish

platform:
  os: linux
  arch: arm64

trigger:
  event:
    include:
      - tag
      - create
  ref:
    include:
      - refs/tags/v*

steps:
  - name: docker-build-and-push
    image: docker:27-cli
    volumes:
      - name: dockersock
        path: /var/run/docker.sock
    environment:
      DOCKER_USERNAME:
        from_secret: DOCKER_USERNAME
      DOCKER_PASSWORD:
        from_secret: DOCKER_PASSWORD
    commands:
      - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - docker buildx create --use --name multiarch-builder || true
      - |
        if echo "${DRONE_TAG}" | grep -Eq "ci-test"; then
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg APP_VERSION=${DRONE_TAG} \
            -t $DOCKER_USERNAME/outage-tracker:${DRONE_TAG} \
            --push \
            .
        else
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg APP_VERSION=${DRONE_TAG} \
            -t $DOCKER_USERNAME/outage-tracker:${DRONE_TAG} \
            -t $DOCKER_USERNAME/outage-tracker:latest \
            --push \
            .
        fi

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock
