---
# Pipeline: Ollama Automated PR Review
kind: pipeline
type: docker
name: ollama-pr-review

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - pull_request

steps:
  - name: run-ollama-review
    image: python:3.13-alpine
    failure: ignore
    environment:
      GITEA_SERVER:
        from_secret: GITEA_SERVER
      GITEA_TOKEN:
        from_secret: GITEA_TOKEN
      OLLAMA_URL:
        from_secret: OLLAMA_URL
      OLLAMA_MODEL: qwen2.5-coder:7b
    commands:
      - echo "Running Ollama PR Review Bot..."
      - python ci/ollama_pr_review.py
