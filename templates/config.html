<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Configuration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; margin-top: 30px; margin-bottom: 50px; }
        .card { background-color: #1e1e1e; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .form-label { font-weight: bold; color: #adb5bd; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 800px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">⚙️ Tracker Configuration</h2>
            <a href="/" class="btn btn-outline-secondary">Cancel</a>
        </div>

        <form method="POST" action="/config">
            <!-- Outage Map Settings -->
            <div class="card p-4 mb-4">
                <h4 class="text-info mb-3">Utility Grid Settings</h4>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Power Company Name</label>
                        <select name="company_name" class="form-select bg-dark text-white border-secondary">
                            <option value="{{ config.company_name }}" selected hidden>{{ config.company_name }}</option>
                            <option>Georgia Power</option>
                            <option>Alabama Power</option>
                            <option>Mississippi Power</option>
                            <option>Duke Energy</option>
                            <option>FirstEnergy</option>
                            <option>National Grid</option>
                            <option>AEP / PSEG / Other KUBRA</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Zip Code (To Track)</label>
                        <input type="text" name="zip_code" class="form-control bg-dark text-white border-secondary" value="{{ config.zip_code }}" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">KUBRA Thematic URL (from Browser DevTools)</label>
                        <input type="url" name="kubra_url" class="form-control bg-dark text-white border-secondary" value="{{ config.kubra_url }}" placeholder="https://kubra.io/data/...">
                    </div>
                    
                    <!-- NEW: Map and Report Links -->
                    <div class="col-md-6">
                        <label class="form-label">Map Website URL (For Banner)</label>
                        <input type="url" name="map_url" class="form-control bg-dark text-white border-secondary" value="{{ config.map_url }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Report Outage URL (For Button)</label>
                        <input type="url" name="report_url" class="form-control bg-dark text-white border-secondary" value="{{ config.report_url }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Alert Threshold (Minutes)</label>
                        <input type="number" name="threshold_mins" class="form-control bg-dark text-white border-secondary" value="{{ config.threshold_mins }}">
                    </div>
                </div>
            </div>

            <!-- Local NUT Settings -->
            <div class="card p-4 mb-4">
                <h4 class="text-info mb-3">Local UPS Settings (Optional)</h4>
                <p class="small text-muted mb-3">Leave Host field blank to disable UPS tracking and widen the dashboard view.</p>
                
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">NUT Server Host / IP</label>
                        <input type="text" name="nut_host" class="form-control bg-dark text-white border-secondary" value="{{ config.nut_host }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Port</label>
                        <input type="number" name="nut_port" class="form-control bg-dark text-white border-secondary" value="{{ config.nut_port }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">UPS Names (Comma separated or 'auto')</label>
                        <input type="text" name="nut_ups_names" class="form-control bg-dark text-white border-secondary" value="{{ config.nut_ups_names }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Critical Min. Runtime (Minutes)</label>
                        <input type="number" name="ups_min_runtime" class="form-control bg-dark text-white border-secondary" value="{{ config.ups_min_runtime }}">
                    </div>
                </div>
            </div>

            <!-- Pushover Settings -->
            <div class="card p-4 mb-4">
                <h4 class="text-info mb-3">Pushover Notifications</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">User Key</label>
                        <input type="password" name="pushover_user" class="form-control bg-dark text-white border-secondary" value="{{ config.pushover_user }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">API Token</label>
                        <input type="password" name="pushover_token" class="form-control bg-dark text-white border-secondary" value="{{ config.pushover_token }}">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100 p-3 fw-bold fs-5">💾 Save Configuration</button>
        </form>
    </div>
</body>
</html>
