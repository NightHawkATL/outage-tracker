<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: #e0e0e0; margin-top: 30px; margin-bottom: 50px; }
        .card { background-color: #1e1e1e; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.3); height: 100%; }
        .status-ok { color: #4caf50; font-weight: bold; }
        .status-outage { color: #f44336; font-weight: bold; }
        .map-banner { transition: transform 0.2s; position: relative; }
        .map-banner:hover { transform: scale(1.02); }
        .map-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: opacity 0.2s; }
        .map-banner:hover img { opacity: 0.6; }
    </style>
    <meta http-equiv="refresh" content="30">
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">⚡ Power Tracking Dashboard</h2>
            <a href="/config" class="btn btn-outline-light">⚙️ Settings</a>
        </div>
        
        <!-- Main Data Cards Row -->
        <div class="row g-4 justify-content-center">
            
            <!-- Utility Card -->
            <div class="{% if state.nut_enabled %}col-md-6{% else %}col-lg-8 mx-auto{% endif %}">
                <div class="card p-4 text-center">
                    <h5 class="text-info">{{ config.company_name }} Area (Zip: <strong>{{ config.zip_code }}</strong>)</h5>
                    <hr>
                    
                    {% if not config.kubra_url %}
                        <h4 class="text-warning mt-4">Awaiting Configuration</h4>
                        <p class="text-muted">Click settings to enter your URL.</p>
                    {% elif state.is_outage %}
